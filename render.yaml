# Optional Render Blueprint — or copy these settings into your existing Web Service.
services:
  - type: web
    name: smart-certificate-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,smart-certificate-management-and.onrender.com"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-certificate-db
          property: connectionString

databases:
  - name: smart-certificate-db
    plan: free
