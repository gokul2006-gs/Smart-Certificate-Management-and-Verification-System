# Optional Render Blueprint — or copy these settings into your existing Web Service.
services:
  - type: web
    name: smart-certificate-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: sh -c "python manage.py migrate && gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,smart-certificate-management-and.onrender.com"
      - key: FRONTEND_BASE_URL
        value: "https://smart-certificate-management-and-verifica-gokul2006-gs-projects.vercel.app"
      - key: FRONTEND_ALLOWED_ORIGINS
        value: "https://smart-certificate-management-and-verifica-gokul2006-gs-projects.vercel.app"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_NAME
        value: "smart_certificate_db"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
